{{ $item := .item }}

<article class="flex h-full flex-col border border-gray-200 bg-white p-6 dark:border-gray-700 dark:bg-gray-900">
  <div class="text-xs font-semibold uppercase text-primary-700 dark:text-primary-300">{{ $item.Params.project_type }}</div>
  <h2 class="mt-3 text-xl font-semibold leading-snug text-gray-900 dark:text-white">
    <a href="{{ $item.RelPermalink }}">{{ $item.Title }}</a>
  </h2>
  <p class="mt-3 grow text-sm leading-6 text-gray-600 dark:text-gray-300">{{ $item.Params.summary }}</p>
  <div class="mt-6 flex flex-wrap gap-x-4 gap-y-2 text-sm font-medium">
    <a class="text-primary-700 hover:underline dark:text-primary-300" href="{{ $item.RelPermalink }}">Project details</a>
    {{ with $item.Params.publication_url }}<a class="text-gray-700 hover:underline dark:text-gray-200" href="{{ . }}" target="_blank" rel="noopener">Publication</a>{{ end }}
    {{ with $item.Params.video_url }}<a class="text-gray-700 hover:underline dark:text-gray-200" href="{{ . }}" target="_blank" rel="noopener">Video</a>{{ end }}
  </div>
</article>
