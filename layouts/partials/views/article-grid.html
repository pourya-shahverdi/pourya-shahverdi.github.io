{{ if eq .index 0 }}
  <div class="featured-video-grid" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem;width:100%;max-width:72rem;">
{{ end }}
{{ $videoID := .item.Params.url_video | replaceRE `^https?://(?:www\.)?(?:youtube\.com/watch\?v=|youtu\.be/)` "" | replaceRE `[?&].*$` "" }}
{{ if and $videoID (ne $videoID "#") }}
  <article style="aspect-ratio:1 / 1;overflow:hidden;background:#000;">
    <iframe
      src="https://www.youtube-nocookie.com/embed/{{ $videoID }}?rel=0"
      title="{{ .item.Title }}"
      loading="lazy"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
      allowfullscreen
      style="display:block;width:100%;height:100%;border:0;"
    ></iframe>
  </article>
{{ end }}
{{ if eq (add .index 1) .config.len }}
  </div>
{{ end }}
