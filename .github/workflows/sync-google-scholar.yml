name: Sync Google Scholar Publications

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch new Google Scholar publications
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: python scripts/sync_google_scholar.py --author-id lhc1WDQAAAAJ

      - name: Install Hugo Blox importer
        run: python -m pip install academic==0.10.0

      - name: Generate publication pages
        run: academic import publications.bib content/publication/ --compact

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "content: sync Google Scholar publications"
          title: "content: sync Google Scholar publications"
          body: "Sync new publications from the configured Google Scholar profile."
          base: main
          branch: sync-google-scholar-publications
          delete-branch: true
          labels: automated-pr, content